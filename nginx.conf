server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _; 

    # SSL Certificate Paths (Self-Signed)
    ssl_certificate     /etc/nginx/ssl/server.crt; 
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m; # Increased cache size
    ssl_session_timeout 1h;

    # --- Global Stability Timeouts ---
    # These prevent "Component no longer available" errors during long-running tasks
    proxy_connect_timeout       600s;
    proxy_send_timeout          600s;
    proxy_read_timeout          600s;
    send_timeout                600s;
    keepalive_timeout           600s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options "SAMEORIGIN";
    server_tokens off;

    # Proxy Buffer Settings (Critical for ZK high-density UI)
    proxy_buffer_size   128k;
    proxy_buffers   4 256k;
    proxy_busy_buffers_size 256k;
    client_max_body_size 20M;

    # --- iDempiere Routes ---

    location /webui {
        proxy_pass        http://app-v12:8080/webui;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  Host $http_host;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /pgadmin {
        proxy_pass http://pgadmin:80/pgadmin;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_http_version 1.1;
    }

    location /api/v1 {
        proxy_pass        http://app-v12:8080/api/v1;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  Host $http_host;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET,POST,DELETE,PUT,PATCH,OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type,api_key,Authorization";
    }

    # Atmosphere Comet (Server Push)
    location /webui/zkau/comet {
        proxy_pass      http://app-v12:8080/webui/zkau/comet;
        proxy_http_version 1.1;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  Host $http_host;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_buffering   off;
        proxy_read_timeout   600s;
    }

    # WebSocket Server Push (Crucial for session stability)
    location /webui/serverpush {
        proxy_pass http://app-v12:8080/webui/serverpush;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade"; # Lowercase 'upgrade' for better compatibility
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s; # Long timeout for persistent sockets
        proxy_send_timeout 3600s;
    }

    # Redirect root to Web UI
    location / {
        return 301 $scheme://$http_host/webui/;
    }
}
